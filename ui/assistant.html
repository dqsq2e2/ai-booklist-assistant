<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>书单助手</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8f5;
      --panel: #ffffff;
      --text: #1c201d;
      --muted: #667064;
      --line: #dfe4dc;
      --accent: #2f6f5e;
      --accent-2: #b56b28;
      --soft: #edf4ef;
      --danger: #b42318;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101412;
        --panel: #171c19;
        --text: #edf2ed;
        --muted: #a5b0a8;
        --line: #29312d;
        --accent: #80c7ad;
        --accent-2: #e3a15e;
        --soft: #1e2a24;
        --danger: #ffb4aa;
      }
    }
    :root[data-ting-theme="light"] {
      color-scheme: light;
      --bg: #f7f8f5;
      --panel: #ffffff;
      --text: #1c201d;
      --muted: #667064;
      --line: #dfe4dc;
      --accent: #2f6f5e;
      --accent-2: #b56b28;
      --soft: #edf4ef;
      --danger: #b42318;
    }
    :root[data-ting-theme="dark"] {
      color-scheme: dark;
      --bg: #101412;
      --panel: #171c19;
      --text: #edf2ed;
      --muted: #a5b0a8;
      --line: #29312d;
      --accent: #80c7ad;
      --accent-2: #e3a15e;
      --soft: #1e2a24;
      --danger: #ffb4aa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 7px;
      min-height: 34px;
      padding: 0 10px;
      cursor: pointer;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    button.ghost { background: transparent; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      outline: none;
    }
    input { height: 36px; padding: 0 10px; }
    textarea { min-height: 74px; resize: vertical; padding: 10px; }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-width: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 16px; letter-spacing: 0; }
    .status { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .status.error { color: var(--danger); }
    .tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      padding: 10px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .tabs button { border-radius: 7px; background: transparent; }
    .tabs button.active {
      border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
      background: var(--soft);
      color: var(--accent);
      font-weight: 700;
    }
    main { min-height: 0; overflow: hidden; }
    .view { display: none; height: 100%; min-height: 0; }
    .view.active { display: grid; }
    #chatView { grid-template-rows: auto 1fr; }
    .quick {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
    }
    .quick button { white-space: nowrap; color: var(--accent); }
    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 92%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: var(--panel);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: var(--soft);
      border-color: color-mix(in srgb, var(--accent) 34%, var(--line));
    }
    .message.assistant { align-self: flex-start; }
    .message.error { border-color: color-mix(in srgb, var(--danger) 46%, var(--line)); color: var(--danger); }
    .draft {
      margin-top: 8px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .tool-log {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      white-space: pre-wrap;
    }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    .composer textarea { min-height: 48px; max-height: 120px; }
    #listsView { grid-template-rows: auto 1fr; }
    .listTools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .lists {
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
    }
    .card h2 { margin: 0 0 4px; font-size: 14px; letter-spacing: 0; }
    .card p { margin: 0; color: var(--muted); font-size: 12px; }
    .book { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); }
    .book strong { display: block; font-size: 13px; }
    .book span { display: block; color: var(--muted); font-size: 12px; }
    .output {
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 8px;
      font-size: 12px;
    }
    .error { color: var(--danger); }
    .empty { color: var(--muted); text-align: center; padding: 36px 16px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>书单助手</h1>
        <div class="status" id="status">加载中</div>
      </div>
      <button class="ghost" id="refreshBtn" title="刷新">刷新</button>
    </header>

    <nav class="tabs" aria-label="书单助手视图">
      <button id="tabChat" class="active" type="button">对话</button>
      <button id="tabHistory" type="button">历史</button>
    </nav>

    <main>
      <section id="chatView" class="view active">
        <div class="quick">
          <button type="button" data-quick="按最近播放整理 8 本续听书单">最近播放</button>
          <button type="button" data-quick="帮我建一个适合睡前听的放松书单">睡前听</button>
          <button type="button" data-quick="按知识学习主题推荐一个书单">学习主题</button>
        </div>
        <div id="messages" class="messages"></div>
      </section>

      <section id="historyView" class="view">
        <div id="history" class="lists"></div>
      </section>
    </main>

    <form class="composer" id="composer">
      <textarea id="prompt" placeholder="例如：帮我从馆藏里建一个 6 本的推理入门书单"></textarea>
      <button class="primary" id="sendBtn" type="submit">发送</button>
    </form>
  </div>

  <script src="./assistant.js"></script>
</body>
</html>
